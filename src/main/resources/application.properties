spring.application.name=survey
server.port=8023

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/learning
spring.datasource.username=${DB_USERNAME :root}
spring.datasource.password=${DB_PASSWORD :password}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis - override REDIS_HOST env var when running inside Docker (use "redis")
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6380}

